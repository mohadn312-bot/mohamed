<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الموظف - إدارة العُهدة والمصروفات</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2e;
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 20px auto;
        }
        h1, h2 { color: #89b4fa; text-align: center; }
        .card {
            background-color: #313244;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input, select {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #45475a;
            background-color: #1e1e2e;
            color: #cdd6f4;
            font-size: 16px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #89b4fa;
            color: #11111b;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
        button:hover { background-color: #b4befe; }
        .balance-box {
            background-color: #45475a;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
        }
        .balance-amount {
            font-size: 32px;
            font-weight: bold;
            color: #a6e3a1;
            margin-top: 10px;
        }
        .hidden { display: none; }
        .logout-btn { background-color: #f38ba8; margin-top: 10px;}
        .logout-btn:hover { background-color: #eba0ac; }
        
        .btn-whatsapp {
            background-color: #25D366;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            margin-top: 10px;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: right; border-bottom: 1px solid #45475a; font-size: 14px; }
        th { background-color: #45475a; color: #89b4fa; }
        .total-row { background-color: #45475a; font-weight: bold; font-size: 16px; }
        .total-amount { color: #a6e3a1; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="loginSection" class="card">
        <h1>تسجيل دخول الموظف 👤</h1>
        <div class="form-group">
            <input type="text" id="loginName" placeholder="اسم المستخدم">
            <input type="password" id="loginPass" placeholder="كلمة المرور">
            <button onclick="login()">دخول</button>
        </div>
    </div>

    <div id="dashboardSection" class="card hidden">
        <h1 id="welcomeMessage">مرحباً</h1>
        
        <div class="balance-box">
            <div>رصيد العُهدة الحالي:</div>
            <div id="currentBalance" class="balance-amount">0</div>
        </div>

        <h2>تسجيل بيان صرف جديد 💸</h2>
        <div class="form-group">
            <select id="expenseCategory">
                <option value="بنزين ومواصلات">بنزين ومواصلات 🚗</option>
                <option value="أدوات مكتبية">أدوات مكتبية 📝</option>
                <option value="صيانة وإصلاحات">صيانة وإصلاحات 🔧</option>
                <option value="ضيافة وطعام">ضيافة وطعام 🍽️</option>
                <option value="مشتريات طارئة">مشتريات طارئة 🚨</option>
                <option value="أخرى">أخرى 📄</option>
            </select>
            <input type="text" id="expenseReason" placeholder="تفاصيل السبب بالتفصيل">
            <input type="number" id="expenseAmount" placeholder="المبلغ المطلوب صرفه">
            <button onclick="processExpense()" style="background-color: #fab387;">تأكيد الصرف</button>
            
            <a id="whatsappBtn" href="#" target="_blank" class="btn-whatsapp">📲 إرسال الفاتورة للمدير عبر WhatsApp</a>
            
            <button class="logout-btn" onclick="logout()">تسجيل الخروج</button>
        </div>

        <hr style="border-color: #45475a; margin: 25px 0;">
        <h2>سجل مصروفاتك الشخصية 📋</h2>
        <table>
            <thead>
                <tr>
                    <th>التصنيف</th>
                    <th>البيان / السبب</th>
                    <th>المبلغ</th>
                    <th>التاريخ والوقت</th>
                </tr>
            </thead>
            <tbody id="empTableBody"></tbody>
            <tfoot id="empTableFoot"></tfoot>
        </table>
    </div>

</div>

<script>
    const dbUrl = "https://mohamed-38770-default-rtdb.firebaseio.com";
    let currentEmpId = null;
    let currentEmpData = null;

    async function login() {
        const name = document.getElementById('loginName').value.trim();
        const pass = document.getElementById('loginPass').value.trim();

        try {
            const res = await fetch(`${dbUrl}/employees.json`);
            const employees = await res.json() || {};

            let foundId = null;
            for (let id in employees) {
                if (employees[id].name === name && employees[id].pass === pass) {
                    foundId = id;
                    currentEmpData = employees[id];
                    break;
                }
            }

            if (foundId) {
                currentEmpId = foundId;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
                updateDashboard();
                // تحديث مستمر كل 7 ثواني لو رصيده زاد يظهر فورا
                setInterval(updateDashboard, 7000);
            } else {
                alert('اسم المستخدم أو كلمة المرور غير صحيحة!');
            }
        } catch (error) {
            alert('حدث خطأ في الاتصال بقاعدة البيانات!');
        }
    }

    async function updateDashboard() {
        if(!currentEmpId) return;
        
        try {
            const res = await fetch(`${dbUrl}/employees/${currentEmpId}.json`);
            currentEmpData = await res.json();
        } catch(e) {}

        const emp = currentEmpData;
        document.getElementById('welcomeMessage').innerText = `مرحباً، ${emp.name} 👋`;
        document.getElementById('currentBalance').innerText = `${emp.budget} نقطة`;
        
        if(emp.budget <= 0) {
            document.getElementById('currentBalance').style.color = '#f38ba8';
        } else {
            document.getElementById('currentBalance').style.color = '#a6e3a1';
        }

        const tbody = document.getElementById('empTableBody');
        const tfoot = document.getElementById('empTableFoot');
        tbody.innerHTML = '';
        tfoot.innerHTML = '';
        
        let totalSpent = 0;

        if (!emp.expenses) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#a6adc8;">لم تقم بتسجيل أي مصروفات بعد.</td></tr>';
        } else {
            Object.values(emp.expenses).forEach(exp => {
                totalSpent += exp.amount;
                tbody.innerHTML += `
                    <tr>
                        <td><mark style="background:#45475a; color:#f9e2af; padding:2px 4px; border-radius:4px;">${exp.category || 'عام'}</mark></td>
                        <td>${exp.reason}</td>
                        <td style="color:#f38ba8; font-weight:bold;">${exp.amount} نقطة</td>
                        <td><small>${exp.time}</small></td>
                    </tr>
                `;
            });

            tfoot.innerHTML = `
                <tr class="total-row">
                    <td colspan="2">إجمالي ما تم صرفه:</td>
                    <td class="total-amount" colspan="2">${totalSpent} نقطة</td>
                </tr>
            `;
        }
    }

    async function processExpense() {
        const category = document.getElementById('expenseCategory').value;
        const reason = document.getElementById('expenseReason').value.trim();
        const amount = parseFloat(document.getElementById('expenseAmount').value);

        if (!reason || isNaN(amount) || amount <= 0) {
            alert('برجاء إدخال تفاصيل الصرف والمبلغ بشكل صحيح.');
            return;
        }

        let timeNow = new Date().toLocaleString('ar-EG');
        const newExpense = { category, reason, amount, time: timeNow };

        let updatedBudget = currentEmpData.budget;
        let waMessage = "";
        let notifText = "";
        let notifType = "finished";

        if (updatedBudget <= 0) {
            updatedBudget -= amount;
            waMessage = `🚨 طلب تعويض مالي عاجل\nالموظف: ${currentEmpData.name}\nصرف من جيبه مبلغ: ${amount} نقطة\nالبند: ${category}\nالسبب: ${reason}`;
            notifText = `🚨 تنبيه: الموظف [${currentEmpData.name}] قام بدفع مبلغ وقدره (${amount}) من حسابه الشخصي لبند [${category}] لغرض: ${reason}.`;
            notifType = "overdraft";
        } else {
            if (amount > updatedBudget) {
                let remainingFromPocket = amount - updatedBudget;
                updatedBudget = 0;
                waMessage = `⚠️ انتهت العُهدة وصرف زيادة\nالموظف: ${currentEmpData.name}\nصرف زيادة بقيمة: ${remainingFromPocket} نقطة\nالبند: ${category}`;
                notifText = `⚠️ انتهت عُهدة الموظف [${currentEmpData.name}]. وصرف زيادة من جيبه بقيمة (${remainingFromPocket}) لبند [${category}].`;
            } else {
                updatedBudget -= amount;
                if (updatedBudget === 0) {
                    notifText = `🔔 الموظف [${currentEmpData.name}] استهلك عُهدته بالكامل الآن في بند [${category}].`;
                }
            }
        }

        // 1. حفظ المصروف الجديد في الفايربيز تحت الموظف
        await fetch(`${dbUrl}/employees/${currentEmpId}/expenses.json`, {
            method: 'POST',
            body: JSON.stringify(newExpense)
        });

        // 2. تحديث الرصيد الحالي للموظف في الفايربيز
        await fetch(`${dbUrl}/employees/${currentEmpId}.json`, {
            method: 'PATCH',
            body: JSON.stringify({ budget: updatedBudget })
        });

        // 3. إرسال الإشعار للفايربيز إذا وُجد
        if(notifText !== "") {
            await fetch(`${dbUrl}/notifications.json`, {
                method: 'POST',
                body: JSON.stringify({ type: notifType, text: notifText, time: timeNow })
            });
        }

        if(waMessage !== "") {
            const encodedMessage = encodeURIComponent(waMessage);
            const whatsappBtn = document.getElementById('whatsappBtn');
            whatsappBtn.href = `https://wa.me/?text=${encodedMessage}`;
            whatsappBtn.style.display = 'block';
        } else {
            document.getElementById('whatsappBtn').style.display = 'none';
        }

        alert('تم تسجيل عملية الصرف وتحديث البيانات بنجاح.');
        document.getElementById('expenseReason').value = '';
        document.getElementById('expenseAmount').value = '';
        updateDashboard();
    }

    function logout() {
        currentEmpId = null;
        currentEmpData = null;
        document.getElementById('loginName').value = '';
        document.getElementById('loginPass').value = '';
        document.getElementById('whatsappBtn').style.display = 'none';
        document.getElementById('dashboardSection').classList.add('hidden');
        document.getElementById('loginSection').classList.remove('hidden');
    }
</script>
</body>
</html>
